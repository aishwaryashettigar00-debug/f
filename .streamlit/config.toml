[theme]
   base = "dark"
   backgroundColor = "#0f1117"
   secondaryBackgroundColor = "#1a1d2e"
   primaryColor = "#667eea"
   textColor = "#e2e8f0"

   [server]
   headless = true
   enableCORS = false
   enableXsrfProtection = false
   maxUploadSize = 200

   [browser]
   gatherUsageStats = false
